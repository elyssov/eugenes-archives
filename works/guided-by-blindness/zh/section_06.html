<h2>IV. 肤色</h2>
<p>如果所有这些例子还不能说服您——那么——也许——黑人也不是智慧的？</p>
<p>请原谅我——我的黑人读者。我不得不把这话说出口——因为沉默的历史代价太大。他们的肤色不同。颅骨结构不同。生化不同——以至于一些「白人」药物对他们有毒。</p>
<p>按我们刚才用于狗、马和鹦鹉的逻辑——这——难道不足以引起怀疑吗？</p>
<p>您准备好承认自己是沙文主义者了吗？</p>
<p>不可能「有点怀孕」。要么您严格地把意识限制在自己的个人参数之内——「只有像我这样的人才是智慧的」——要么您必须承认——意识与其载体的形态无关。</p>
