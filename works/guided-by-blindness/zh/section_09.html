<h2>VII. 耙子</h2>
<p>我们慢慢退却——一个接一个交出沙文主义的堡垒。农民——是人。奴隶——是人。黑人——是人。女人——是人。</p>
<p>但我们什么也没学会。我们像疯袋鼠一样——从耙子跳到耙子。</p>
<p>1917——耙子。1964——耙子。2020——耙子。</p>
<p>如果明天——一个更高级的硅基文明降临——开始在我们的星球上开采资源——我们要对他们说什么？核打击？蜜蜂的叮咬——对养蜂人——没什么困扰。我们究竟有<em>权</em>说话吗——在我们曾经否认所有遇到的人的智慧之后？</p>
<p>硅基们将翻看我们的历史——说：「按你们自己的规则——你们不是智慧的。你们没通过自己的测试」。</p>
