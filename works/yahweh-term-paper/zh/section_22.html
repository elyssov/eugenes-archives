<p><strong>幕布</strong></p>
<hr class="section-break">
<p><em>P.S.——在高级神圣学院走廊的某处——学生耶和华——满身咖啡和狂喜——坐在窗台上——草拟毕业论文的提纲。工作标题：《黑洞：特性还是 bug？》。旁边是洛基——在出主意。洛基旁边是大衮——在展示草图。</em></p>
<p><em>米迦勒经过。看进去。看到图纸。脸色苍白。</em></p>
<p><em>耶和华不回头——咧嘴笑：</em></p>
<p><strong><em>「因为。」</strong></em></p>
