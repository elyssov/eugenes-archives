<h2>场景</h2>
<p><em>高级神圣学院校长办公室。天花板伸向无穷（字面意义上的——不是隐喻）。桌子由石化的时间制成（时间动力学教研室的礼物——重得像命运）。墙上挂着——文凭、奖状——和一张照片：年轻的万物之父在毕业典礼上与混沌握手。两人都在笑。混沌——没有所有的手。万物之父——没有所有的幻想。</em></p>
<p><em>桌上的牌子：「距退休：∞」。</em> <em>第二块牌子——是手写补的：「这是<em>能感觉到</em>的」。</em> <em>第三块——最小的——是米迦勒贴的：「耶和华——14:00」。</em></p>
