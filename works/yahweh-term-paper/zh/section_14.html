<h2>第十场：雌雄同体</h2>
<p><em>米迦勒去取苦艾酒时——耶和华试图<em>悄悄</em>把什么东西藏到背后。某个东西从他指间滑出——光滑、优雅、说不清是什么——滚过桌面——飞进展开的行星全息模型——降落在东南亚那一带。</em></p>
<p><em>万物之父用一个看着流星落进自家屋子的人的表情——目送了飞行轨迹。慢慢转向耶和华。</em></p>
<p><em>沉默。漫长的。</em></p>
<p><strong>耶和华</strong> <em>（举起手）</em>：实验性模型！为了平衡某些地区的基因多样性！</p>
<p><strong>万物之父</strong>：它。掉进了。泰国。</p>
<p><strong>耶和华</strong>：……为了旅游业？</p>
<p><strong>米迦勒</strong> <em>（拿着苦艾酒回来——记录）</em>：「雌雄同体。泰国。旅游业。此行永不向伦理委员会展示。」</p>
